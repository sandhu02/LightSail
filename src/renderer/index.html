<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LightSail</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
  <body>
    <div id="app">
      <!-- ── Sidebar ── -->
      <div id="sidebar">

        <div class="sidebar-header">
          <div class="logo">
            <!-- Sail icon -->
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="13" cy="13" r="13" fill="rgba(79,158,255,0.18)"/>
              <path d="M13 5 L13 20 L6 20 Q10 14 13 5Z" fill="#4f9eff"/>
              <path d="M13 8 L13 20 L20 20 Q17 14 13 8Z" fill="rgba(79,158,255,0.5)"/>
              <line x1="13" y1="20" x2="13" y2="22" stroke="#4f9eff" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">LightSail</span>
          </div>

          <!-- Collapse button -->
          <button class="icon-btn" id="collapse-btn" title="Collapse sidebar">
            <svg id="collapse-btn" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <!-- New Tab -->
        <button id="new-tab">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="new-tab-label">New Tab</span>
        </button>

        <!-- Tabs -->
        <div id="tabs-container"></div>

        <!-- Footer -->
        <div class="sidebar-footer">
          <button class="icon-btn" id="controls-btn" title="Controls">
            <!-- Sliders icon -->
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="4" cy="4" r="1.5" stroke="currentColor" stroke-width="1.4"/>
              <line x1="1" y1="4" x2="2.5" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="5.5" y1="4" x2="15" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <circle cx="10" cy="8" r="1.5" stroke="currentColor" stroke-width="1.4"/>
              <line x1="1" y1="8" x2="8.5" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="11.5" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <circle cx="6" cy="12" r="1.5" stroke="currentColor" stroke-width="1.4"/>
              <line x1="1" y1="12" x2="4.5" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="7.5" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <span id="controls-label">Controls</span>
          </button>

          <div id="profile">
            <div class="profile-avatar">UN</div>
            <div class="profile-info">
              <div class="profile-name">User Name</div>
              <div class="profile-sub">Free plan</div>
            </div>
          </div>
        </div>
        </div>

        <!-- ── Main content ── -->
        <div id="main-content">
          <div id="toolbar">
              <button class="toolbar-btn" id="back" title="Back">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <button class="toolbar-btn" id="forward" title="Forward">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <button class="toolbar-btn" id="reload" title="Reload">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M13.5 8A5.5 5.5 0 1 1 10 3.07" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                  <path d="M10 1v3h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-100 10.9 3.4)"/>
                </svg>
              </button>

              <input id="address-bar" type="text" placeholder="Search or enter address" />

            <button id="ask-ai">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M7 1.5C4 1.5 1.5 4 1.5 7S4 12.5 7 12.5c.8 0 1.6-.2 2.3-.5L12 13l-.5-2.7c.6-.9 1-2 1-3.3C12.5 4 10 1.5 7 1.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                  <circle cx="5" cy="7" r="0.8" fill="currentColor"/>
                  <circle cx="7" cy="7" r="0.8" fill="currentColor"/>
                  <circle cx="9" cy="7" r="0.8" fill="currentColor"/>
                </svg>
              Ask AI
            </button>
          </div>
          <div id="viewport"></div>
        </div>

        <aside id="ask-ai-panel" class="ask-ai-panel" aria-hidden="true">
          <div class="ask-ai-header">
            <h3>Ask AI</h3>
            <button id="ask-ai-close" type="button" class="ask-ai-close-btn" aria-label="Close Ask AI panel">✕</button>
          </div>
          <div id="ask-ai-messages" class="ask-ai-messages">
            <div class="ask-ai-empty">
              Ask questions about the current page: summarize, explain, or translate content.
            </div>
          </div>
          <form id="ask-ai-form" class="ask-ai-form">
            <textarea id="ask-ai-input" placeholder="Ask about this page..." rows="2"></textarea>
            <button id="ask-ai-send" type="submit">Send</button>
          </form>
        </aside>
    </div>

    <script src="./scripts/index.js"></script>

  </body>
</html>
